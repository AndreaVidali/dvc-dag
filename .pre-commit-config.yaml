default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      # ---- pre-commit
      - id: uv-sort
        name: uv-sort
        entry: uv run uv-sort
        language: system
        files: ^pyproject\.toml$
        stages:
          - pre-commit

      - id: ruff-format
        name: ruff format
        entry: uv run ruff
        args:
          - format
        language: system
        types_or:
          - python
          - pyi
        stages:
          - pre-commit

      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff
        args:
          - check
          - --fix
        language: system
        types_or:
          - python
          - pyi
        stages:
          - pre-commit

      # ---- pre-push
      - id: ty-check
        name: ty check
        entry: uv run ty
        args:
          - check
        language: system
        pass_filenames: false
        stages:
          - pre-push

      - id: deptry
        name: deptry
        entry: uv run deptry
        args:
          - .
        language: system
        pass_filenames: false
        stages:
          - pre-push

      - id: pytest
        name: pytest
        entry: uv run pytest
        args:
          - tests
        language: system
        pass_filenames: false
        stages:
          - pre-push
