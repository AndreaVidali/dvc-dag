stages:
  normalize-listings:
    cmd: python pipelines/preprocessing.py normalize-listings
    wdir: "../.."
    deps:
      - pipelines/preprocessing.py
      - data/listings.json
    outs:
      - data/listings_normalized.json:
          cache: false
    frozen: true

  normalize-comps:
    cmd: python pipelines/preprocessing.py normalize-comps
    wdir: "../.."
    deps:
      - pipelines/preprocessing.py
      - data/market_comps.json
    outs:
      - data/market_comps_normalized.json:
          cache: false
    frozen: true

  join-market-context:
    cmd: python pipelines/preprocessing.py join-market-context
    wdir: "../.."
    deps:
      - pipelines/preprocessing.py
      - data/analytics_base.json
      - data/listings_normalized.json
      - data/market_comps_normalized.json
    outs:
      - data/market_context.json:
          cache: false
    frozen: true
