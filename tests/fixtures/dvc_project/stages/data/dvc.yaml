stages:
  nested-do-unrelated-stuff:
    cmd: python pipelines/nested/data.py do-unrelated-stuff
    wdir: "../.."
    deps:
      - pipelines/nested/data.py
    outs:
      - pipelines/nested/data/unrelated.json:
          cache: false
    frozen: true

  nested-import-data-blue:
    cmd: python pipelines/nested/data.py import-data-blue
    wdir: "../.."
    deps:
      - pipelines/nested/data/raw_blue.json
      - pipelines/nested/data.py
    outs:
      - pipelines/nested/data/blue.json:
          cache: false
    frozen: true

  nested-import-data-red:
    cmd: python pipelines/nested/data.py import-data-red
    wdir: "../.."
    deps:
      - pipelines/nested/data/raw_red.json
      - pipelines/nested/data.py
    outs:
      - pipelines/nested/data/red.json:
          cache: false
    frozen: true
