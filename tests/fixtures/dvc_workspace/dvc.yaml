stages:
  root-do-unrelated-stuff:
    cmd: python pipelines/root/data.py do-unrelated-stuff
    deps:
      - pipelines/root/data.py
    outs:
      - pipelines/root/data/unrelated.json:
          cache: false
    frozen: true

  root-import-data-blue:
    cmd: python pipelines/root/data.py import-data-blue
    deps:
      - pipelines/root/data/raw_blue.json
      - pipelines/root/data.py
    outs:
      - pipelines/root/data/blue.json:
          cache: false
    frozen: true

  root-import-data-red:
    cmd: python pipelines/root/data.py import-data-red
    deps:
      - pipelines/root/data/raw_red.json
      - pipelines/root/data.py
    outs:
      - pipelines/root/data/red.json:
          cache: false
    frozen: true

  root-create-dataset:
    cmd: python pipelines/root/features.py
    deps:
      - pipelines/root/features.py
      - pipelines/root/data/blue.json
      - pipelines/root/data/red.json
    outs:
      - pipelines/root/data/dataset.json:
          cache: false
    frozen: true

  root-find-hyperparameters:
    cmd: python pipelines/root/model.py find-hyperparameters
    deps:
      - pipelines/root/model.py
    outs:
      - pipelines/root/data/hyperparameters.json:
          cache: false
    frozen: true

  root-train-model:
    cmd: python pipelines/root/model.py train-model
    deps:
      - pipelines/root/model.py
      - pipelines/root/data/dataset.json
      - pipelines/root/data/hyperparameters.json
      - pipelines/root/data/blue.json
    outs:
      - pipelines/root/data/model.json:
          cache: false
    frozen: true

  root-train-models:
    foreach:
      - out_of_sample
      - out_of_time
      - full
    do:
      cmd: python pipelines/root/model.py train-model --split ${item}
      deps:
        - pipelines/root/model.py
        - pipelines/root/data/dataset.json
        - pipelines/root/data/hyperparameters.json
        - pipelines/root/data/blue.json
      outs:
        - pipelines/root/data/model-${item}.json:
            cache: false
      frozen: true

  root-generate-dag:
    cmd: dvc-dag
      --delete-text "dvc_pipelines/"
      --delete-text "tests/"
      --collapse-stage "root-train-models=split"
      --collapse-stage "dvc_pipelines/model/dvc.yaml:nested-train-models=split"
      --colors-random-seed 12
      --out docs/dvc_dag.png
    deps:
      - ../../../src/dvc_dag/cli.py
      - ../../../src/dvc_dag/colors.py
      - ../../../src/dvc_dag/draw.py
      - ../../../src/dvc_dag/logger.py
    outs:
      - docs/dvc_dag.png:
          cache: false
    frozen: false
