stages:
  nested-find-hyperparameters:
    cmd: python pipelines/nested/model.py find-hyperparameters
    wdir: "../.."
    deps:
      - pipelines/nested/model.py
    outs:
      - pipelines/nested/files/hyperparameters.json:
          cache: false
    frozen: true

  nested-train-model:
    cmd: python pipelines/nested/model.py train-model
    wdir: "../.."
    deps:
      - pipelines/nested/model.py
      - pipelines/nested/files/dataset.json
      - pipelines/nested/files/hyperparameters.json
      - pipelines/nested/files/blue.json
    outs:
      - pipelines/nested/files/model.json:
          cache: false
    frozen: true

  nested-train-models:
    foreach:
      - out_of_sample
      - out_of_time
      - full
    do:
      cmd: python pipelines/nested/model.py train-model --split ${item}
      wdir: "../.."
      deps:
        - pipelines/nested/model.py
        - pipelines/nested/files/dataset.json
        - pipelines/nested/files/hyperparameters.json
        - pipelines/nested/files/blue.json
      outs:
        - pipelines/nested/files/model-${item}.json:
            cache: false
      frozen: true
